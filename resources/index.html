<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webpack Setup</title>
</head>
<body class="bg-gray-100 text-gray-800 flex flex-col items-center justify-center min-h-screen">

    <div class="text-center flex flex-col items-center">
        <div x-data="confettiComponent()" class="w-auto h-auto">
            <div @click="startConfettiEffect">
              <h1 class="underline sm:text-[red]  text-[30px]">Webpack Setup</h1>
              <p id="message" class=" sm:text-[green]  text-[30px]"></p>              
            </div>

        </div>
        <!-- Counter with Increment/Decrement Buttons -->
        <div x-data="{ count: 0 }" class="mt-6">
            <span class="text-2xl font-semibold mb-4 block" x-text="count"></span>
            <div class="flex justify-center space-x-4">
                <button class="bg-blue-500 text-white px-4 py-2 rounded" @click="if (count > 0) count--">Decrement</button>
                <button class="bg-green-500 text-white px-4 py-2 rounded" @click="count++">Increment</button>
            </div>
        </div>

        <h1 x-data="{ message: 'I ❤️ Alpine' }" x-text="message"></h1>
        <h1 class="text-2xl font-bold mb-4">A simple HTMX request.</h1>

        <!-- Button to trigger HTMX request -->
        <button
          hx-get="https://jsonplaceholder.typicode.com/users"  
          hx-target="#result"
          class="p-2 bg-blue-500 text-white rounded-lg"
          x-data = "{buttonText: 'Click to Test HTMX'}"
          x-text="buttonText"
        >
          <!-- Click to Test HTMX -->
        </button>

        <!-- This will display the response from the server -->
        <div id="result" class="mt-4 p-4 bg-white rounded shadow">
          <!-- Server response will be displayed here -->
        </div>
    </div>
    
</body>
</html>
