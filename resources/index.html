<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeScript + Tailwind</title>

</head>
<body class="flex justify-center items-center min-h-screen font-bold text-[30px] ">
    <div  class="flex flex-col justify-center items-center text-center">
        <h1 class="underline sm:text-[red]">Webpack</h1>

        <p id="message" class=" sm:text-[green]"></p>

        <br/>
        <div x-data="{ count: 0 }">

            <span x-text="count"></span>
            <div class="flex">
                <button x-on:click="count > 0 ? count-- : 0" class="m-[20px] bg-[red] rounded-lg text-[white] p-4">
                    Decrement
                </button>                 
                
                <button x-on:click="count++" class="m-[20px] bg-[red] rounded-lg text-[white] p-4">
                    Increment
                </button> 

            </div>

           
        </div>

        <h1 x-data="{ message: 'I ❤️ Alpine' }" x-text="message"></h1>
        <h1 class="text-2xl font-bold mb-4">HTMX Simple Request Test</h1>

        <!-- Button to trigger HTMX request -->
        <button
          hx-get="http://localhost:5001/"  
          hx-target="#result"
          class="p-2 bg-blue-500 text-white rounded"
        >
          Click to Test HTMX
        </button>
      
        <!-- This will display the response from the server -->
        <div id="result" class="mt-4 p-4 bg-white rounded shadow">
          <!-- Server response will be displayed here -->
        </div>
      
    </div>
</body>
</html>
